version: 0.0
os: linux

files:
  - source: /
    destination: /home/ec2-user/lms

hooks:

  ApplicationStop:
    - location: scripts/stop_container.sh
      timeout: 300
      runas: root

  BeforeInstall:
    - location: scripts/remove_container.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/login_ecr.sh
      timeout: 300
      runas: root

    - location: scripts/pull_image.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/start_backend.sh
      timeout: 300
      runas: root

    - location: scripts/start_frontend.sh
      timeout: 300
      runas: root
